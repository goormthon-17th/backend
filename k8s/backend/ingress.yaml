apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: backend-ingress
    annotations:
        kubernetes.io/ingress.class: nginx
spec:
    rules:
        - host: goormthon-4.goorm.training #FIXME:
          http:
              paths:
                  - path: /api
                    pathType: Prefix
                    backend:
                        service:
                            name: backend-service
                            port:
                                number: 80
                  # express.static — POST /api/upload/image 로 저장한 파일 조회
                  - path: /uploads
                    pathType: Prefix
                    backend:
                        service:
                            name: backend-service
                            port:
                                number: 80
